name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: |
          npm run format
          git diff --exit-code

      - name: Compile contracts (typed artifacts for viem)
        run: npm run compile

      - name: Enforce L1 runtime size limit (vault)
        run: npm run size:check:vault

      - name: Check TypeScript types
        run: npm run typecheck

      - name: Run tests
        run: npm run test
